    # ── faro.walkergh.com (Faro Collector) ───────────────────────────
    server {
        listen 443 ssl http2;

        ssl_certificate /etc/ssl/certificate.pem;
        ssl_certificate_key /etc/ssl/certificate.key;

        server_name faro.walkergh.com;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location /collect {
            limit_req zone=faro burst=20 nodelay;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://localhost:10347;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 404;
        }

        error_log /var/log/nginx/faro.error.log warn;
        access_log /var/log/nginx/faro.access.log;
    }

