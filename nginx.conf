user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    # ── Faro rate limiting & CORS ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=faro:10m rate=10r/s;

    map $http_origin $cors_origin {
        "https://revsticks.ch"            $http_origin;
        "https://app.revsticks.ch"        $http_origin;
        "https://app-stage.revsticks.ch"  $http_origin;
        "https://stage.revsticks.ch"      $http_origin;
        "https://frutig-electronics.ch"   $http_origin;
        "https://walkergh.com"            $http_origin;
        "https://cwx-dev.com"             $http_origin;
        "http://localhost:3000"           $http_origin;
        default "";
    }

    # ── cwx-dev.com ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        ssl_certificate /etc/ssl/certificate.pem;
        ssl_certificate_key /etc/ssl/certificate.key;

        server_name cwx-dev.com;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }

